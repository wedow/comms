version: 2

builds:
  - id: comms
    main: ./cmd/comms
    goos:
      - darwin
      - linux
    goarch:
      - amd64
      - arm64
    ignore:
      - goos: linux
        goarch: arm64
  - id: comms-telegram
    main: ./cmd/comms-telegram
    goos:
      - darwin
      - linux
    goarch:
      - amd64
      - arm64
    ignore:
      - goos: linux
        goarch: arm64

archives:
  - builds:
      - comms
      - comms-telegram
    format: tar.gz
    files:
      - LICENSE*
      - README*

checksum:
  algorithm: sha256

release:
  github:

changelog:
  use: github-native

snapshot:
  name_template: '{{ .Version }}-snapshot-{{ .ShortCommit }}'

brews:
  - repository:
      owner: wedow
      name: homebrew-tools
    directory: Formula
    homepage: https://github.com/wedow/comms
    description: Filesystem-based messaging interface for AI agents
    license: MIT
    install: |
      bin.install "comms"
      bin.install "comms-telegram"
    service: |
      run [opt_bin/"comms", "daemon", "start"]
      keep_alive true
      working_dir Dir.home
      log_path var/"log/comms.log"
      error_log_path var/"log/comms.log"
